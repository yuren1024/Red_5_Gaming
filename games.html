<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏选择 - 红五游戏中心</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/auth.js"></script>
    <script>
      window.HWWJAuth.protectPage("login.html");
    </script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Game Select</p>
          <h1>游戏选择</h1>
          <p class="hero-copy">
            欢迎回来，<span id="current-username"></span>。当前已开放多个游戏入口，选择一个开始吧。
          </p>
        </div>
        <div class="hero-actions">
          <button id="logout-btn" class="ghost-btn">退出登录</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>可选游戏</h2>
            <p>当前版本提供红五五家记分和贪吃蛇小游戏。</p>
          </div>
        </div>

        <div class="game-grid">
          <article class="game-card">
            <p class="eyebrow">Available Now</p>
            <h3>红五五家</h3>
            <p>进入记分页面，支持一般情况、独打和逃跑的本地记分与统计。</p>
            <button id="enter-hongwu-btn" class="primary-btn">进入游戏</button>
          </article>
          <article class="game-card">
            <p class="eyebrow">Available Now</p>
            <h3>贪吃蛇</h3>
            <p>经典休闲小游戏，支持方向键控制和本地最高分记录。</p>
            <button id="enter-snake-btn" class="primary-btn">开始游戏</button>
          </article>
        </div>
      </section>
    </main>

    <script src="js/games.js"></script>
  </body>
</html>
